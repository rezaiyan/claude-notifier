name: Build Homebrew Bottles

on:
  # Called automatically by release.yml after every tag release
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  # Manual re-build trigger
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build bottles for (e.g. v1.2.0)"
        required: true

jobs:
  # ── Build one bottle per macOS version ───────────────────────────────────────
  build:
    name: Bottle (${{ matrix.bottle_tag }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            bottle_tag: arm64_sequoia
          - os: macos-14
            bottle_tag: arm64_sonoma

    steps:
      - uses: Homebrew/actions/setup-homebrew@master

      - name: Tap the Homebrew tap repo
        run: brew tap rezaiyan/tap https://github.com/rezaiyan/homebrew-tap

      - name: Install from source (build bottle)
        run: brew install --build-bottle rezaiyan/tap/claude-notifier

      - name: Sign ClaudeNotifier.app with Developer ID Application
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "ci-temp" ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p "ci-temp" ci.keychain
          security import /tmp/cert.p12 -k ci.keychain \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "ci-temp" ci.keychain
          rm /tmp/cert.p12

          # Validate cert type — must be Developer ID Application, not Apple Development
          if ! security find-identity -v -p codesigning ci.keychain \
              | grep -q "Developer ID Application"; then
            echo "ERROR: APPLE_IDENTITY must be a 'Developer ID Application' certificate."
            echo "       'Apple Development' certificates are for device testing only."
            exit 1
          fi

          APP="$(brew --prefix rezaiyan/tap/claude-notifier)/ClaudeNotifier.app"
          # --options runtime required for notarization compatibility
          codesign --force --deep --sign "$APPLE_IDENTITY" --options runtime "$APP"
          codesign --verify --deep "$APP"
          codesign -dv "$APP" 2>&1 | grep -E "Authority|TeamIdentifier"

      - name: Notarize and staple ClaudeNotifier.app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP="$(brew --prefix rezaiyan/tap/claude-notifier)/ClaudeNotifier.app"
          ditto -c -k --keepParent "$APP" /tmp/ClaudeNotifier.zip
          xcrun notarytool submit /tmp/ClaudeNotifier.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP"
          spctl -a -vvv "$APP" 2>&1 | tee /dev/stderr | grep -q "accepted"
          rm /tmp/ClaudeNotifier.zip

      - name: Create bottle and rename to Homebrew's expected filename
        run: |
          TAG="${{ inputs.tag }}"
          brew bottle \
            --json \
            --root-url "https://github.com/rezaiyan/claude-notifier/releases/download/${TAG}" \
            rezaiyan/tap/claude-notifier
          # brew bottle outputs: name--version.tag.bottle.N.tar.gz
          # Homebrew fetches:    name-version.tag.bottle.tar.gz  (single dash, no revision)
          for f in *--*.bottle.*.tar.gz; do
            new=$(echo "$f" | sed 's/--/-/; s/\.bottle\.[0-9]*\.tar\.gz/.bottle.tar.gz/')
            mv "$f" "$new"
            echo "Renamed: $f → $new"
          done

      - name: Upload bottle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bottle-${{ matrix.bottle_tag }}
          path: |
            *.bottle.tar.gz
            *.bottle.json

  # ── Upload bottles to release + update formula in tap ────────────────────────
  publish:
    name: Publish bottles
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all bottle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bottle-*
          merge-multiple: true
          path: ./bottles

      - name: Upload bottles to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag }}"
          find ./bottles -name "*.bottle.tar.gz" | while read -r f; do
            echo "Uploading: $f"
            gh release upload "${TAG}" "${f}" \
              --repo rezaiyan/claude-notifier --clobber
          done

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: rezaiyan/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Inject bottle stanzas into formula
        run: |
          python3 - <<'EOF'
          import json, re
          from pathlib import Path

          bottle_files = sorted(Path("./bottles").glob("**/*.bottle.json")) or \
                         sorted(Path("./bottles").glob("**/*.json"))
          if not bottle_files:
              raise SystemExit("No bottle JSON files found")

          # Collect root_url and { bottle_tag: sha256 } from all JSON files
          bottles: dict[str, str] = {}
          root_url: str = ""
          for f in bottle_files:
              data = json.loads(f.read_text())
              for _name, info in data.items():
                  root_url = root_url or info["bottle"].get("root_url", "")
                  for tag, details in info["bottle"]["tags"].items():
                      bottles[tag] = details["sha256"]

          # Build the stanza block (root_url tells Homebrew where our bottles live)
          lines = ["  bottle do\n"]
          if root_url:
              lines.append(f'    root_url "{root_url}"\n')
          for tag, sha in sorted(bottles.items()):
              lines.append(
                  f'    sha256 cellar: :any_skip_relocation, {tag}: "{sha}"\n'
              )
          lines.append("  end\n")
          stanza = "".join(lines)

          formula = Path("tap/Formula/claude-notifier.rb")
          content = formula.read_text()

          # Replace existing bottle block or insert after the license line
          if "  bottle do" in content:
              content = re.sub(
                  r"  bottle do\n.*?  end\n", stanza, content, flags=re.DOTALL
              )
          else:
              content = re.sub(
                  r"(  license [^\n]+\n)", r"\1\n" + stanza, content
              )

          formula.write_text(content)
          print(f"Injected {len(bottles)} bottle stanza(s)")
          EOF

      - name: Commit updated formula
        working-directory: tap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-notifier.rb
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "bottles: ${{ inputs.tag }}"
          git push
