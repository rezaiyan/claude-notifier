name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Create GitHub release ──────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog notes
        id: changelog
        run: |
          notes=$(python3 scripts/extract-changelog.py "${{ steps.version.outputs.version }}")
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "${{ steps.changelog.outputs.notes }}"

  # ── Update Homebrew tap ────────────────────────────────────────────────────
  deploy-brew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: rezaiyan/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Compute tarball sha256
        id: tarball
        run: |
          version="${{ github.ref_name }}"
          url="https://github.com/rezaiyan/claude-notifier/archive/refs/tags/${version}.tar.gz"
          sha256=$(curl -sL "$url" | shasum -a 256 | awk '{print $1}')
          echo "url=$url"       >> "$GITHUB_OUTPUT"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"

      - name: Sync and update formula
        run: |
          # Copy the full formula from source so structural changes are always reflected
          cp source/Formula/claude-notifier.rb tap/Formula/claude-notifier.rb

          python3 - \
            "${{ github.ref_name }}" \
            "${{ steps.tarball.outputs.url }}" \
            "${{ steps.tarball.outputs.sha256 }}" \
            <<'PYEOF'
          import re, sys
          from pathlib import Path

          tag, url, sha256 = sys.argv[1], sys.argv[2], sys.argv[3]
          version = tag.lstrip("v")

          path = Path("tap/Formula/claude-notifier.rb")
          content = path.read_text()
          content = re.sub(r'url ".*"',     f'url "{url}"',         content)
          content = re.sub(r'sha256 ".*"',  f'sha256 "{sha256}"',   content)
          content = re.sub(r'version ".*"', f'version "{version}"', content)
          path.write_text(content)
          PYEOF

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-notifier.rb
          git commit -m "claude-notifier ${{ github.ref_name }}"
          git push
